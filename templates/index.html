<!DOCTYPE html>
<html>

<head>

<title>Student Record System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4 text-primary">Student Record Management System</h2>

<a href="/add" class="btn btn-success mb-3">Add Student</a>

<h5>Total Students: {{students|length}}</h5>

<table class="table table-bordered table-striped">

<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Email</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>

<td>{{s.id}}</td>
<td>{{s.name}}</td>
<td>{{s.course}}</td>
<td>{{s.email}}</td>

<td>

<a href="/edit/{{s.id}}" class="btn btn-primary btn-sm">Edit</a>

<a href="/delete/{{s.id}}" 
class="btn btn-danger btn-sm"
onclick="return confirm('Are you sure you want to delete this student?')">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
